# =============================================================================
# pytest.ini — Configuración de pytest
# =============================================================================
# Convención tomada del ejemplo api_middlewares_testing de la cátedra.
# =============================================================================

[pytest]
# ─── Paths ───────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Salida ──────────────────────────────────────────────────────────────────
# -v: verbose | --tb=short: tracebacks legibles | -ra: resumen de skips/xfails
addopts = -v --tb=short -ra --strict-markers

# ─── Markers personalizados ──────────────────────────────────────────────────
# Con --strict-markers todo marker debe declararse acá.
markers =
    unit: Tests unitarios (sin HTTP, sin BD, lógica pura).
    integration: Tests de integración (HTTP, BD, stack completo).
